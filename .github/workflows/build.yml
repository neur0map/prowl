name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Run tests
        run: go test ./...

  version:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      skipped: ${{ steps.bump.outputs.skipped }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next patch version
        id: bump
        run: |
          # Get latest tag matching the current major.minor
          LATEST=$(git tag --sort=-v:refname --list 'v*' | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="v0.1.1"
          else
            # Extract major.minor.patch
            BASE=${LATEST#v}
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=$(echo "$BASE" | cut -d. -f3)
            # If the latest tag points at HEAD, skip (already released)
            if [ "$(git rev-list -n1 "$LATEST")" = "$(git rev-parse HEAD)" ]; then
              echo "skipped=true" >> "$GITHUB_OUTPUT"
              echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "skipped=false" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: steps.bump.outputs.skipped == 'false'
        run: |
          git tag ${{ steps.bump.outputs.tag }}
          git push origin ${{ steps.bump.outputs.tag }}

  build:
    needs: [test, version]
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.version.result == 'success' || needs.version.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: prowl-linux-amd64
          - os: macos-14
            artifact: prowl-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Build binary
        run: |
          VERSION="${{ needs.version.outputs.tag }}"
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ]; then
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          go build -ldflags="-s -w -X main.Version=$VERSION" \
            -o ${{ matrix.artifact }} ./cmd/prowl/

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    if: needs.version.outputs.skipped == 'false'
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            artifacts/prowl-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
